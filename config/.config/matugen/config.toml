[config]

################
## PRINCIPAIS ##
################

[templates.hyprland]
input_path = './templates/hyprland-colors.conf'
output_path = '~/.config/hypr/modules/colors.conf'

[templates.waybar]
input_path = './templates/colors.css'
output_path = '~/.config/waybar/colors.css'

[templates.hypr-dock]
input_path = './templates/colors.css'
output_path = '~/.config/hypr-dock/themes/lotos/colors.css'

[templates.kitty]
input_path = './templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'

[templates.rofi]
input_path = './templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.wlogout]
input_path = './templates/colors.css'
output_path = '~/.config/wlogout/colors.css'

[templates.swaync]
input_path = './templates/colors.css'
output_path = '~/.config/swaync/colors.css'

[templates.swayosd]
input_path = './templates/colors.css'
output_path = '~/.config/swayosd/colors.css'

[templates.gtk3]
input_path = './templates/gtk.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme m3-gtk'

[templates.gtk4]
input_path = './templates/gtk.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.kvantum_kvconfig]
input_path = './templates/kvantum-colors.kvconfig'
output_path = '~/.config/Kvantum/matugen/matugen.kvconfig'

[templates.kvantum_svg]
input_path = './templates/kvantum-colors.svg'
output_path = '~/.config/Kvantum/matugen/matugen.svg'

#################
## SECUNDARIOS ##
#################

[templates.btop]
input_path = './templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

[templates.micro]
input_path = './templates/micro.micro'
output_path = '~/.config/micro/colorschemes/matugen.micro'

[templates.vesktop]
input_path = './templates/midnight-discord.css'
output_path = '~/.config/Vencord/themes/matugen.css'

[templates.sddm]
input_path = './templates/sddm.conf'
output_path = '~/.dotfiles/sddm/sddm-current/theme.conf'

[templates.slurp]
input_path = './templates/slurp.json'
output_path = '~/.config/scripts/slurp/colors.json'

[templates.pywallfox]
input_path  = './templates/pywallfox-colors.json'
output_path = '~/.cache/wal/colors.json'
post_hook = 'pywalfox update'
