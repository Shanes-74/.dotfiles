#############################
### VARIÁVEIS DE AMBIENTE ###
#############################

# Veja em https://wiki.hypr.land/Configuring/Environment-variables/

# XDG BASE DIRECTORIES
env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CACHE_HOME,$HOME/.cache
env = XDG_DATA_HOME,$HOME/.local/share

# CURSOR
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,32

# HYPRLAND & WAYLAND CORE
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = DESKTOP_SESSION,hyprland

# GTK
env = GTK_THEME,m3-gtk

# QT APPS
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
#env = QT_STYLE_OVERRIDE,kvantum
#env = QT_QUICK_CONTROLS_STYLE,Material
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_WAYLAND_SHELL_INTEGRATION,xdg-shell

# APPS NATIVOS & TOOLKITS
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = _JAVA_AWT_WM_NONREPARENTING,1

# UTILITÁRIOS
env = TERMINAL,kitty
env = FILEMANAGER,thunar
env = CLIPHIST_DB_PATH,$XDG_RUNTIME_DIR/cliphist.db

# INTEL
#env = LIBVA_DRIVER_NAME,iHD
env = WLR_DRM_NO_ATOMIC,1
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0

# Descomente e teste
env = LIBVA_DRIVER_NAME,nvidia
env = VDPAU_DRIVER,nvidia  # Adicione esta também
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct