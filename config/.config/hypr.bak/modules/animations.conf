#################
### ANIMAÇÕES ###
#################



# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    
    # --- CURVAS BEZIER ---
	# Base Android
    bezier = android,      0.4,  0.0,  0.2,  1.0
    bezier = androidIn,    0.3,  0.0,  0.1,  1.0
    bezier = androidOut,   0.1,  0.0,  0.3,  1.0
    bezier = androidSoft,  0.35, 0.0,  0.15, 1.0

    # Entrada: desacelera e ultrapassa 10%
    bezier = springIn,     0.18, 0.89, 0.32, 1.10

    # Saída: recua 10% e acelera para fora
    bezier = springOut,    0.6, -0.10, 0.73, 0.05

    # --- CONFIGURAÇÕES DE ANIMAÇÃO (tempos originais) ---
    animation = global,           1,     5,     android
    animation = border,           1,     4,     default

    animation = windows,          1,     5,     android,      slide
    animation = windowsIn,        1,     4,     springIn,     slide
    animation = windowsOut,       1,     5,     springOut,    slide

    animation = fade,             1,     4,     android
    animation = fadeIn,           1,     3,     springIn
    animation = fadeOut,          1,     4,     springOut

    animation = layers,           1,     4,     android,      slide
    animation = layersIn,         1,     4,     springIn,     slide
    animation = layersOut,        1,     4,     springOut,    slide
    animation = fadeLayersIn,     1,     3,     springIn
    animation = fadeLayersOut,    1,     4,     springOut

    animation = workspaces,       1,     5,     androidSoft,  slide
    animation = workspacesIn,     1,     4,     springIn,     slide
    animation = workspacesOut,    1,     4,     springOut,    slide

    animation = zoomFactor,       1,     4,     springIn
}
