# ========================================
# Hyprlock - Config com Cores Dinâmicas
# ========================================

source = modules/colors.conf

general {
    disable_loading_bar = true
    hide_cursor = false
}

# Fundo da tela
background {
    monitor =
    path = screenshot
    color = rgba(0, 0, 0, 0.3)

    blur_size = 3
    blur_passes = 4
    vibrancy = 0.2
    brightness = 0.8
    noise = 0.1
    contrast = 1.5
    vibrancy_darkness = 0
    ignore_opacity = true
}

# Relógio
label {
    monitor =
    text = $TIME
    font_size = 128
    font_family = Google Sans Display
    color = $primary

    position = 0, 260
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 32
    font_family = Google Sans Display
    color = $on_surface

    position = 0, 140
    halign = center
    valign = center
}

# Caixa de senha
input-field {
    monitor =
    size = 280, 50

    position = 0, -320
    halign = center
    valign = center

    outline_thickness = 3
    
    outer_color = $primary
    inner_color = $surface_container_low
    font_color = $on_surface
    check_color = $tertiary
    fail_color = $error

    rounding = 50
    placeholder_text = Digite sua senha
    placeholder_text_color = $on_surface_variant_alpha
    hide_input = false
}