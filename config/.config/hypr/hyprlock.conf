# ========================================
# Hyprlock - Config com Cores Dinâmicas
# ========================================

source = modules/colors.conf

general {
    disable_loading_bar = true
    hide_cursor = false
}

# Fundo da tela
background {
    monitor =
    path = $image

    blur_size = 3
    blur_passes = 4
    vibrancy = 0.2
    brightness = 0.80
    noise = 0.04
    contrast = 1.5
    vibrancy_darkness = 0.2
}

# Horas
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $primary
    font_size = 180
    font_family = Google Sans Flex Freeze
    shadow_passes = 3
    shadow_size = 4

    position = 0, 320
    halign = center
    valign = center
}

# Minutos
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $primary_container
    font_size = 180
    font_family = Google Sans Flex Freeze
    shadow_passes = 3
    shadow_size = 4

    position = 0, 120
    halign = center
    valign = center
}

# Today
label {
    monitor =
    text = cmd[update:3600000] echo "<b><big> $(date +'%A') </big></b>"
    color = $tertiary
    font_size = 45
    font_family = Google Sans Flex Freeze
    shadow_passes = 3
    shadow_size = 4

    position = 0, -12
    halign = center
    valign = center
}

# Week
label {
    monitor =
    text = cmd[update:3600000] date +'%d %B'
    color = $tertiary
    font_size = 22
    font_family = Google Sans Flex Freeze
    shadow_passes = 3
    shadow_size = 4

    position = 0, -75
    halign = center
    valign = center
}

# Caixa de senha
input-field {
    monitor =
    size = 320, 56

    position = 0, 180
    halign = center
    valign = bottom

    outline_thickness = 3
    shadow_passes = 3
    shadow_size = 4
    
    outer_color = $primary
    inner_color = $surface_container_low
    font_color = $on_surface
    check_color = $tertiary
    fail_color = $error

    dots_size = 0.32 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 1.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rouding = -1

    rounding = 50
    fade_on_empty = true
    placeholder_text = <i>Senha...</i>
    placeholder_text_color = $surface_container_lowest
    hide_input = false
}