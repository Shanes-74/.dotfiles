###############
### INICIAR ###
###############

# Inicie automaticamente os processos necessários (como daemons de notificações, barras de status, etc.)
# Ou execute seus aplicativos favoritos na inicialização, assim:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = systemd-run --user --scope --unit=firefox firefox

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = dbus-update-activation-environment --systemd --all

exec-once = awww-daemon

exec-once = systemctl --user restart swayosd.service

exec-once = systemctl --user restart swaync.service

exec-once = pgrep -x hypridle || hypridle

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once = waybar

exec-once = ~/.config/scripts/hypr-dock/hypr-dock-autohide.sh

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
