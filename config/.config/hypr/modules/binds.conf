###############
### ATALHOS ###
###############

binds {
    movefocus_cycles_fullscreen = true
}

# Veja https://wiki.hypr.land/Configuring/Keywords/

$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, Veja https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, SPACE, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod CTRL, L, exec, ~/.config/scripts/power-menu/powermenu.sh
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, Thunar
bind = $mainMod, F, togglefloating
bind = $mainMod, TAB, exec, rofi -show drun || pkill rofi
#bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, ALT_L, layoutmsg, togglesplit # dwindle
bind = $mainMod, F11, fullscreen, 1
bind = , F11, fullscreen, 0
bind = $mainMod, B, exec, firefox
#bind = ALT, Tab, exec, ~/.config/scripts/window_tab/tab.py
bind = $mainMod SHIFT, W, exec, ~/.config/scripts/wallpaper/wallmenu.py
bind = $mainMod SHIFT, F, pin


#=== Aplicativos ===#

# WhatsApp
bind = $mainMod, Z, exec, flatpak run com.rtosta.zapzap

# Abrir e fechar a waybar
bind = $mainMod, ESCAPE, exec, killall waybar || waybar &

# Abrir editor de texto
bind = $mainMod, C, exec, code

# Printshot
bind = , PRINT, exec, printshot region
bind = SHIFT, PRINT, exec, printshot window
bind = ALT, PRINT, exec, printshot monitor
bind = $mainMod, PRINT, exec, printshot full

# Abrir area de transferência (clipboard)
bind = $mainMod, V, exec, ~/.config/scripts/clipboard/clipboard.sh #cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# Abrir Central de notificações (swaync)
bind = $mainMod, P, exec, swaync-client -R -rs -t

# Mudar tema (rofi + scripts)
#bind = $mainMod SHIFT_L, S, exec, ~/.config/scripts/spotify/spotwindow.sh

# Filtro de luz azul (night light)
bind = $mainMod, N, exec, night-mode

# Hypridle toggle
bind = $mainMod, H, exec, ~/.config/waybar/custom-modules/hypridle/hypridle.sh toggle

# Move focus with mainMod + WASD
bind = $mainMod, A, movefocus, l
bind = $mainMod, D, movefocus, r
bind = $mainMod, W, movefocus, u
bind = $mainMod, S, movefocus, d

# Move windows with mainMod + arrows
bind = $mainMod, LEFT, movewindow, l
bind = $mainMod, RIGHT, movewindow, r
bind = $mainMod, UP, movewindow, u
bind = $mainMod, DOWN, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -5

bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness +5
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness -5

# Requires playerctl
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPause, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl previous

# Outros
#bind = , XF86PowerOff, exec, wlogout -b 4 -T 350 -B 325 -c 10
bind = , XF86PowerOff, exec, ~/.config/scripts/power-menu/powermenu.sh
bindl = , XF86Launch1, exec, DAMX
