##################
### PERMISSÕES ###
##################

# Veja em https://wiki.hypr.land/Configuring/Permissions/
# Observe que as alterações de permissão aqui exigem a reinicialização do Hyprland e não são aplicadas instantaneamente
# por motivos de segurança

toplevel_export = true

#ecosystem {
#    enforce_permissions = 1
#}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hypr-dock, screencopy, allow
permission = /usr/(bin|local/bin)/hypr-dock, plugin, allow
