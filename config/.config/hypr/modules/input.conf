################
### ENTRADAS ###
################

# Veja em https://wiki.hypr.land/Configuring/Variables/#input

input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2
    kb_options =
    kb_rules =

    repeat_rate = 35
    repeat_delay = 600

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 2
    no_hardware_cursors = 0
}

# Example per-device config
# Veja https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}