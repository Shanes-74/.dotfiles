# Este é um exemplo de arquivo de configuração do Hyprland.
# Consulte o wiki para obter mais informações.
# https://wiki.hypr.land/Configuring/

# Observe que nem todas as configurações / opções disponíveis estão definidas aqui.
# Para uma lista completa, consulte o wiki

# Você pode dividir esta configuração em vários arquivos
# Crie seus arquivos separadamente e vincule-os a este arquivo assim:
# fonte = ~/.config/hypr/myColors.conf


# MONITOR
source = ~/.config/hypr/modules/monitors.conf

# INICIAR
source = ~/.config/hypr/modules/autostart.conf

# VARIAVÉIS
source = ~/.config/hypr/modules/env.conf

# PERMISSÕES
source = ~/.config/hypr/modules/permissions.conf

# APARÊNCIA
source = ~/.config/hypr/modules/decoration.conf
source = ~/.config/hypr/modules/animations.conf

# ENTRADAS
source = ~/.config/hypr/modules/input.conf

# GESTOS
source = ~/.config/hypr/modules/gestures.conf

# ATALHOS
source = ~/.config/hypr/modules/binds.conf

# JANELAS
source = ~/.config/hypr/modules/windowrules.conf

# ORGANIZAÇÃO
#source = ~/.config/hypr/modules/workspaces.conf
source = ~/.config/hypr/modules/layout.conf

# OUTROS
source = ~/.config/hypr/modules/misc.conf

# HyprMod managed settings
source = /home/shane/.config/hypr/hyprland-gui.conf
